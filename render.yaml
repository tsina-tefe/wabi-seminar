# Deploy the React (Vite) frontend on Render as a static site.
# Dashboard: New → Blueprint → connect repo, or add this file and sync.
# Set VITE_API_URL to your backend origin (e.g. https://your-api.onrender.com), no trailing slash.

services:
  - type: web
    name: wabi-seminar-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
